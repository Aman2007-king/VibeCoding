<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Nexus Forge — AI-powered cloud IDE" />
    <!-- PWA -->
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#10b981" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="VibeCoding" />
<link rel="apple-touch-icon" href="/icon-192.png" />
    <title>Nexus Forge: AI-Powered Full-Stack IDE</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: #0A0A0B;
        color: #fff;
        font-family: system-ui, -apple-system, sans-serif;
        overflow: hidden;
      }
      
      #root { height: 100vh; }

      #splash {
        position: fixed; inset: 0;
        background: #050505;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 20px;
        z-index: 99999;
        transition: opacity 0.6s ease, transform 0.6s ease;
      }

      #splash.fade-out {
        opacity: 0;
        transform: scale(1.03);
        pointer-events: none;
      }

      #splash.hidden {
        display: none;
      }

      .splash-logo {
        width: 72px; height: 72px;
        background: #10b981;
        border-radius: 20px;
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 0 40px rgba(16,185,129,0.3);
        animation: logoBounce 1.2s ease-in-out infinite;
      }

      .splash-bar-wrap {
        width: 220px; height: 3px;
        background: #1a1a1a;
        border-radius: 99px;
        overflow: hidden;
      }

      .splash-bar-fill {
        height: 100%;
        background: linear-gradient(90deg, #10b981, #34d399);
        border-radius: 99px;
        width: 0%;
        transition: width 0.4s ease;
      }

      .splash-status {
        font-size: 11px;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: #52525b;
        min-height: 16px;
      }

      .splash-dots {
        display: flex; gap: 6px;
      }
      .splash-dots span {
        width: 6px; height: 6px;
        background: #10b981;
        border-radius: 50%;
        opacity: 0.3;
        animation: dotPulse 1.2s ease-in-out infinite;
      }
      .splash-dots span:nth-child(2) { animation-delay: 0.2s; }
      .splash-dots span:nth-child(3) { animation-delay: 0.4s; }

      .splash-version {
        position: absolute;
        bottom: 24px;
        font-size: 10px;
        color: #3f3f46;
        letter-spacing: 0.2em;
      }

      @keyframes logoBounce {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-10px) rotate(2deg); }
      }
      @keyframes dotPulse {
        0%, 100% { opacity: 0.3; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.4); }
      }
    </style>
  </head>

  <body>
    <div id="splash">
      <div class="splash-logo">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none"
          stroke="white" stroke-width="2.5" stroke-linecap="round">
          <polyline points="16 18 22 12 16 6"/>
          <polyline points="8 6 2 12 8 18"/>
        </svg>
      </div>
      <div class="splash-bar-wrap">
        <div class="splash-bar-fill" id="splash-bar"></div>
      </div>
      <div class="splash-dots">
        <span></span><span></span><span></span>
      </div>
      <div class="splash-status" id="splash-status">Waking up server...</div>
      <div class="splash-version">NEXUS FORGE v2.0</div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      const bar    = document.getElementById('splash-bar');
      const status = document.getElementById('splash-status');
      const splash = document.getElementById('splash');
      let hidden = false;

      const stages = [
        { pct: 8,  ms: 0,    label: 'Waking up server...'       },
        { pct: 20, ms: 800,  label: 'Loading runtime...'        },
        { pct: 35, ms: 1800, label: 'Connecting to Firebase...' },
        { pct: 55, ms: 3000, label: 'Loading editor...'         },
        { pct: 70, ms: 4500, label: 'Preparing workspace...'    },
        { pct: 85, ms: 6000, label: 'Almost ready...'           },
        { pct: 95, ms: 8000, label: 'Finalizing...'             },
      ];

      stages.forEach(({ pct, ms, label }) => {
        setTimeout(() => {
          if (!hidden) {
            bar.style.width = pct + '%';
            status.textContent = label;
          }
        }, ms);
      });

      function hideSplash() {
        if (hidden) return;
        hidden = true;
        bar.style.width = '100%';
        status.textContent = 'Ready!';
        setTimeout(() => {
          splash.classList.add('fade-out');
          setTimeout(() => {
            splash.classList.add('hidden');
          }, 700);
        }, 300);
      }

      // ✅ More reliable detection — check every 200ms
      const checkInterval = setInterval(() => {
        const root = document.getElementById('root');
        if (root && root.innerHTML.trim().length > 0) {
          clearInterval(checkInterval);
          hideSplash();
        }
      }, 200);

      // ✅ Also use MutationObserver as backup
      const observer = new MutationObserver(() => {
        const root = document.getElementById('root');
        if (root && root.children.length > 0) {
          observer.disconnect();
          clearInterval(checkInterval);
          hideSplash();
        }
      });
      observer.observe(document.getElementById('root'), {
        childList: true, subtree: true
      });

      // ✅ Hard timeout 20s
      setTimeout(() => {
        clearInterval(checkInterval);
        observer.disconnect();
        hideSplash();
      }, 20000);
    </script>
  </body>
</html>
