<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Nexus Forge — AI-powered cloud IDE" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#10b981" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="VibeCoding" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- ✅ Google Fonts - Inter + JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <title>Nexus Forge: AI-Powered Full-Stack IDE</title>

    <style>
      /* Splash screen only - minimal styles that won't conflict with Tailwind */
      html, body { height: 100%; margin: 0; padding: 0; }

      body {
        background: #0A0A0B;
        color: #fff;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        overflow: hidden;
      }

      #root { height: 100%; }

      #splash {
        position: fixed; inset: 0;
        background: #050505;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 20px;
        z-index: 99999;
        transition: opacity 0.6s ease, transform 0.6s ease;
      }

      #splash.fade-out {
        opacity: 0;
        transform: scale(1.03);
        pointer-events: none;
      }

      #splash.hidden { display: none; }

      .splash-logo {
        width: 72px; height: 72px;
        background: #10b981;
        border-radius: 20px;
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 0 40px rgba(16,185,129,0.3);
        animation: logoBounce 1.2s ease-in-out infinite;
      }

      .splash-bar-wrap {
        width: 220px; height: 3px;
        background: #1a1a1a;
        border-radius: 99px;
        overflow: hidden;
      }

      .splash-bar-fill {
        height: 100%;
        background: linear-gradient(90deg, #10b981, #34d399);
        border-radius: 99px;
        width: 0%;
        transition: width 0.4s ease;
      }

      .splash-status {
        font-size: 11px;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: #52525b;
        min-height: 16px;
        font-family: 'Inter', system-ui, sans-serif;
      }

      .splash-dots { display: flex; gap: 6px; }
      .splash-dots span {
        width: 6px; height: 6px;
        background: #10b981;
        border-radius: 50%;
        opacity: 0.3;
        animation: dotPulse 1.2s ease-in-out infinite;
      }
      .splash-dots span:nth-child(2) { animation-delay: 0.2s; }
      .splash-dots span:nth-child(3) { animation-delay: 0.4s; }

      .splash-version {
        position: absolute;
        bottom: 24px;
        font-size: 10px;
        color: #3f3f46;
        letter-spacing: 0.2em;
        font-family: 'Inter', system-ui, sans-serif;
      }

      /* ── Feature badges rendered on splash ── */
      .splash-features {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
        max-width: 320px;
      }
      .splash-feature-badge {
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #10b981;
        background: rgba(16,185,129,0.08);
        border: 1px solid rgba(16,185,129,0.2);
        border-radius: 99px;
        padding: 4px 10px;
        font-family: 'Inter', system-ui, sans-serif;
      }

      @keyframes logoBounce {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-10px) rotate(2deg); }
      }
      @keyframes dotPulse {
        0%, 100% { opacity: 0.3; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.4); }
      }
    </style>
  </head>

  <body>
    <div id="splash">
      <div class="splash-logo">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none"
          stroke="white" stroke-width="2.5" stroke-linecap="round">
          <polyline points="16 18 22 12 16 6"/>
          <polyline points="8 6 2 12 8 18"/>
        </svg>
      </div>
      <div class="splash-bar-wrap">
        <div class="splash-bar-fill" id="splash-bar"></div>
      </div>
      <div class="splash-dots">
        <span></span><span></span><span></span>
      </div>
      <div class="splash-status" id="splash-status">Waking up server...</div>

      <!-- ── Feature badges ── -->
      <div class="splash-features" id="splash-features"></div>

      <div class="splash-version">NEXUS FORGE v2.0</div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      // ─────────────────────────────────────────────────────────────────
      // STARTER FILE TEMPLATES
      // Consumed by the editor to seed a new project's file tree.
      // ─────────────────────────────────────────────────────────────────
      window.NEXUS_STARTER_TEMPLATES = [
        {
          name: 'index.html',
          language: 'html',
          code: `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>✅ Todo App</title>
  <script src="https://cdn.tailwindcss.com"><\/script>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center p-4">
  <div id="root"></div>
  <script>
let todos = JSON.parse(localStorage.getItem('nexus-todos') || '[]');
function render() {
  const root = document.getElementById('root');
  root.innerHTML = '<div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-md">'
    + '<h1 class="text-2xl font-bold text-white mb-6">✅ Todo App</h1>'
    + '<div class="flex gap-2 mb-4">'
    + '<input id="todo-input" type="text" placeholder="Add a todo..." '
    + 'class="flex-1 bg-gray-700 text-white rounded-lg px-3 py-2 text-sm outline-none border border-gray-600 focus:border-emerald-500" '
    + 'onkeydown="if(event.key===\'Enter\')addTodo()"/>'
    + '<button onclick="addTodo()" class="bg-emerald-500 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-emerald-400">Add</button>'
    + '</div>'
    + '<ul class="space-y-2">'
    + todos.map(function(t, i) {
        return '<li class="flex items-center gap-3 p-3 bg-gray-700 rounded-lg group">'
          + '<input type="checkbox" ' + (t.done ? 'checked' : '') + ' onchange="toggle(' + i + ')" class="w-4 h-4 accent-emerald-500 cursor-pointer"/>'
          + '<span class="' + (t.done ? 'line-through opacity-40' : '') + ' flex-1 text-white text-sm">' + t.text + '</span>'
          + '<button onclick="remove(' + i + ')" class="opacity-0 group-hover:opacity-100 text-red-400 text-xs font-bold">✕</button>'
          + '</li>';
      }).join('')
    + '</ul>'
    + '<p class="text-gray-500 text-xs mt-4 text-center">'
    + todos.filter(function(t){ return t.done; }).length + '/' + todos.length + ' completed'
    + '</p></div>';
}
function addTodo() {
  var input = document.getElementById('todo-input');
  if (!input.value.trim()) return;
  todos.push({ text: input.value.trim(), done: false });
  save(); input.value = '';
}
function toggle(i) { todos[i].done = !todos[i].done; save(); }
function remove(i) { todos.splice(i, 1); save(); }
function save() { localStorage.setItem('nexus-todos', JSON.stringify(todos)); render(); }
render();
  <\/script>
</body>
</html>`
        },
        {
          name: 'app.js',
          language: 'javascript',
          code: `// app.js — Nexus Forge starter
// This file is intentionally kept as-is so your own logic goes here.
// It is also inlined into index.html via a <script> tag at build time.

console.log('Nexus Forge app.js loaded');
`
        }
      ];

      // ─────────────────────────────────────────────────────────────────
      // SPLASH — FEATURE BADGES
      // ─────────────────────────────────────────────────────────────────
      const SPLASH_FEATURES = ['⚡ Lightning Fast', '🔒 Secure by Default', '🤖 AI Powered'];

      const featuresEl = document.getElementById('splash-features');
      SPLASH_FEATURES.map(function(f) {
        const badge = document.createElement('span');
        badge.className = 'splash-feature-badge';
        badge.textContent = f;
        return badge;
      }).forEach(function(el) { featuresEl.appendChild(el); });

      // ─────────────────────────────────────────────────────────────────
      // SPLASH — PROGRESS BAR
      // ─────────────────────────────────────────────────────────────────
      const bar    = document.getElementById('splash-bar');
      const status = document.getElementById('splash-status');
      const splash = document.getElementById('splash');
      let hidden = false;

      const stages = [
        { pct: 8,  ms: 0,    label: 'Waking up server...'       },
        { pct: 20, ms: 800,  label: 'Loading runtime...'        },
        { pct: 35, ms: 1800, label: 'Connecting to Firebase...' },
        { pct: 55, ms: 3000, label: 'Loading editor...'         },
        { pct: 70, ms: 4500, label: 'Preparing workspace...'    },
        { pct: 85, ms: 6000, label: 'Almost ready...'           },
        { pct: 95, ms: 8000, label: 'Finalizing...'             },
      ];

      stages.forEach(function({ pct, ms, label }) {
        setTimeout(function() {
          if (!hidden) {
            bar.style.width = pct + '%';
            status.textContent = label;
          }
        }, ms);
      });

      function hideSplash() {
        if (hidden) return;
        hidden = true;
        bar.style.width = '100%';
        status.textContent = 'Ready!';
        setTimeout(function() {
          splash.classList.add('fade-out');
          setTimeout(function() { splash.classList.add('hidden'); }, 700);
        }, 300);
      }

      const checkInterval = setInterval(function() {
        const root = document.getElementById('root');
        if (root && root.innerHTML.trim().length > 0) {
          clearInterval(checkInterval);
          hideSplash();
        }
      }, 200);

      const observer = new MutationObserver(function() {
        const root = document.getElementById('root');
        if (root && root.children.length > 0) {
          observer.disconnect();
          clearInterval(checkInterval);
          hideSplash();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true, subtree: true });

      setTimeout(function() {
        clearInterval(checkInterval);
        observer.disconnect();
        hideSplash();
      }, 20000);
    </script>
  </body>
</html>
